name: Generate API Database Markdown

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Run generation script
        run: python scripts/generate.py
          
      - name: Commit generated data and markdown
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md categories/ reports/ data/stats.json data/rankings.json
          git commit -m "docs: auto-generate massive API database UI" || exit 0
          git push
