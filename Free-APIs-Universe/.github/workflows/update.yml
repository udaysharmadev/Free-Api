name: Auto-generate README and Category Pages

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Generate pages
        run: |
          python scripts/generate_readme.py
          python scripts/generate_category_pages.py
          
      - name: Commit generated markdown
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md categories/
          git commit -m "docs: auto-generate markdown from JSON" || exit 0
          git push
